<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers For You 🌹</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;600&display=swap">
    <style>
        *, *::after, *::before {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-color: #0d0015;
        }

        body {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #fee9f7, #e8f5fe, #fef2e8, #f0ffe8);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            perspective: 1000px;
            font-family: 'Quicksand', sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== Night Sky Background ===== */
        .night {
            display: none;
        }

        /* ===== Page Title Overlay ===== */
        .page-title {
            position: fixed;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
            opacity: 0;
            animation: fadeInTitle 2s 3s forwards;
            width: 90%;
            max-width: 650px;
            background: rgba(255, 235, 245, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 1.5rem 2rem;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.1);
        }

        .page-title h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #ff1493;
            text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.2);
            margin-bottom: 1rem;
        }

        .page-title p {
            font-size: 1.15rem;
            color: #c2185b;
            font-weight: 600;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        @keyframes fadeInTitle {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ===== Continue Button ===== */
        .continue-wrapper {
            position: fixed;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            opacity: 0;
            animation: fadeInTitle 2s 7s forwards;
        }

        .continue-btn {
            padding: 0.8rem 1.5rem;
            font-size: 1.1rem;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            background: linear-gradient(45deg, #ff69b4, #da70d6);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(255, 105, 180, 0.4);
            transition: all 0.3s;
            animation: btnFloat 3s ease-in-out infinite;
        }

        .continue-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 35px rgba(255, 105, 180, 0.6);
        }

        @keyframes btnFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* ===== Flowers Container ===== */
        .flowers {
            position: relative;
            transform: scale(0.9);
        }

        /* ===== Flower Base ===== */
        .flower {
            position: absolute;
            bottom: 10vmin;
            transform-origin: bottom center;
            z-index: 10;
            --fl-speed: 0.8s;
        }

        /* --- Flower 1: Red Rose --- */
        .flower--1 {
            animation: moving-flower-1 4s linear infinite;
        }
        .flower--1 .flower__line {
            height: 70vmin;
            animation-delay: 0.3s;
        }
        .flower--1 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.6s backwards; }
        .flower--1 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.4s backwards; }
        .flower--1 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 1.2s backwards; }
        .flower--1 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1s backwards; }
        .flower--1 .flower__line__leaf--5 { animation: blooming-leaf-right var(--fl-speed) 1.8s backwards; }
        .flower--1 .flower__line__leaf--6 { animation: blooming-leaf-left var(--fl-speed) 2s backwards; }

        .flower--1 .flower__leaf {
            background-color: #e63946;
            background-image: linear-gradient(to top, #8b0000, #e63946);
        }
        .flower--1 .flower__leaf--4 {
            background-image: linear-gradient(to top, #6b0f1a, #c1121f);
        }
        .flower--1 .flower__leafs::after {
            background-color: #ff4d6d;
        }

        /* --- Flower 2: Pink Rose --- */
        .flower--2 {
            left: 50%;
            transform: rotate(20deg);
            animation: moving-flower-2 4s linear infinite;
        }
        .flower--2 .flower__line {
            height: 60vmin;
            animation-delay: 0.6s;
        }
        .flower--2 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.9s backwards; }
        .flower--2 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.7s backwards; }
        .flower--2 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 1.5s backwards; }
        .flower--2 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1.3s backwards; }

        .flower--2 .flower__leaf {
            background-color: #ff69b4;
            background-image: linear-gradient(to top, #c9184a, #ff85c8);
        }
        .flower--2 .flower__leaf--4 {
            background-image: linear-gradient(to top, #a4133c, #ff99cc);
        }
        .flower--2 .flower__leafs::after {
            background-color: #ffb3d9;
        }

        /* --- Flower 3: White Rose --- */
        .flower--3 {
            left: 50%;
            transform: rotate(-15deg);
            animation: moving-flower-3 4s linear infinite;
        }
        .flower--3 .flower__line {
            animation-delay: 0.9s;
        }
        .flower--3 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 2.5s backwards; }
        .flower--3 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 2.3s backwards; }
        .flower--3 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 2.1s backwards; }
        .flower--3 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1.9s backwards; }

        .flower--3 .flower__leaf {
            background-color: #fff0f5;
            background-image: linear-gradient(to top, #dbb7c5, #fff5f8);
        }
        .flower--3 .flower__leaf--4 {
            background-image: linear-gradient(to top, #c9a0b0, #fff0f5);
        }
        .flower--3 .flower__leafs::after {
            background-color: rgba(255, 240, 245, 0.7);
        }

        /* ===== Petals (leafs) Container ===== */
        .flower__leafs {
            position: relative;
            animation: blooming-flower 2s backwards;
        }
        .flower__leafs--1 { animation-delay: 1.1s; }
        .flower__leafs--2 { animation-delay: 1.4s; }
        .flower__leafs--3 { animation-delay: 1.7s; }

        .flower__leafs::after {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            transform: translate(-50%, -100%);
            width: 8vmin;
            height: 8vmin;
            background-color: #ff69b4;
            filter: blur(10vmin);
        }

        /* ===== Individual Petals ===== */
        .flower__leaf {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 8vmin;
            height: 11vmin;
            border-radius: 51% 49% 47% 53% / 44% 45% 55% 69%;
            background-color: #ff69b4;
            background-image: linear-gradient(to top, #c9184a, #ff69b4);
            transform-origin: bottom center;
            opacity: 0.9;
            box-shadow: inset 0 0 2vmin rgba(255, 255, 255, 0.5);
        }
        .flower__leaf--1 { transform: translate(-10%, 1%) rotateY(40deg) rotateX(-50deg); }
        .flower__leaf--2 { transform: translate(-50%, -4%) rotateX(40deg); }
        .flower__leaf--3 { transform: translate(-90%, 0%) rotateY(45deg) rotateX(50deg); }
        .flower__leaf--4 {
            width: 8vmin;
            height: 8vmin;
            transform-origin: bottom left;
            border-radius: 4vmin 10vmin 4vmin 4vmin;
            transform: translate(-0%, 18%) rotateX(70deg) rotate(-43deg);
            background-image: linear-gradient(to top, #a4133c, #ff69b4);
            z-index: 1;
            opacity: 0.8;
        }

        /* ===== Flower Center ===== */
        .flower__white-circle {
            position: absolute;
            left: -3.5vmin;
            top: -3vmin;
            width: 9vmin;
            height: 4vmin;
            border-radius: 50%;
            background-color: #fff;
        }
        .flower__white-circle::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 45%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 60%;
            border-radius: inherit;
            background-image:
                repeating-linear-gradient(135deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(67.5deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(135deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(112.5deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(112.5deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(22.5deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(22.5deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(135deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(157.5deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(67.5deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(67.5deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px),
                linear-gradient(90deg, rgb(255, 235, 18), rgb(255, 206, 0));
        }

        /* ===== Stem ===== */
        .flower__line {
            height: 55vmin;
            width: 1.5vmin;
            background-image:
                linear-gradient(to left, rgba(0,0,0,0.2), transparent, rgba(255,255,255,0.2)),
                linear-gradient(to top, transparent 10%, #2d6a4f, #52b788);
            box-shadow: inset 0 0 2px rgba(0,0,0,0.5);
            animation: grow-flower-tree 4s backwards;
        }

        /* ===== Stem Leaves ===== */
        .flower__line__leaf {
            --w: 7vmin;
            --h: calc(var(--w) + 2vmin);
            position: absolute;
            top: 20%;
            left: 90%;
            width: var(--w);
            height: var(--h);
            border-top-right-radius: var(--h);
            border-bottom-left-radius: var(--h);
            background-image: linear-gradient(to top, rgba(45, 106, 79, 0.4), #52b788);
        }
        .flower__line__leaf--1 { transform: rotate(70deg) rotateY(30deg); }
        .flower__line__leaf--2 { top: 45%; transform: rotate(70deg) rotateY(30deg); }
        .flower__line__leaf--3,
        .flower__line__leaf--4,
        .flower__line__leaf--6 {
            border-top-right-radius: 0;
            border-bottom-left-radius: 0;
            border-top-left-radius: var(--h);
            border-bottom-right-radius: var(--h);
            left: -460%;
            top: 12%;
            transform: rotate(-70deg) rotateY(30deg);
        }
        .flower__line__leaf--4 { top: 40%; }
        .flower__line__leaf--5 {
            top: 0;
            transform-origin: left;
            transform: rotate(70deg) rotateY(30deg) scale(0.6);
        }
        .flower__line__leaf--6 {
            top: -2%;
            left: -450%;
            transform-origin: right;
            transform: rotate(-70deg) rotateY(30deg) scale(0.6);
        }

        /* ===== Light Particles ===== */
        .flower__light {
            position: absolute;
            bottom: 0vmin;
            width: 1vmin;
            height: 1vmin;
            background-color: rgb(255, 251, 0);
            border-radius: 50%;
            filter: blur(0.2vmin);
            animation: light-ans 4s linear infinite backwards;
        }
        .flower__light:nth-child(odd) { background-color: #ff69b4; }
        .flower__light--1 { left: -2vmin; animation-delay: 1s; }
        .flower__light--2 { left: 3vmin; animation-delay: 0.5s; }
        .flower__light--3 { left: -6vmin; animation-delay: 0.3s; }
        .flower__light--4 { left: 6vmin; animation-delay: 0.9s; }
        .flower__light--5 { left: -1vmin; animation-delay: 1.5s; }
        .flower__light--6 { left: -4vmin; animation-delay: 3s; }
        .flower__light--7 { left: 3vmin; animation-delay: 2s; }
        .flower__light--8 { left: -6vmin; animation-delay: 3.5s; }

        /* ===== Grass & Greenery ===== */
        .flower__grass {
            --c: #40916c;
            --line-w: 1.5vmin;
            position: absolute;
            bottom: 12vmin;
            left: -7vmin;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            z-index: 20;
            transform-origin: bottom center;
            transform: rotate(-48deg) rotateY(40deg);
        }
        .flower__grass--1 { animation: moving-grass 2s linear infinite; }
        .flower__grass--2 {
            left: 2vmin;
            bottom: 10vmin;
            transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);
            opacity: 0.8;
            z-index: 0;
            animation: moving-grass--2 1.5s linear infinite;
        }
        .flower__grass--top {
            width: 7vmin;
            height: 10vmin;
            border-top-right-radius: 100%;
            border-right: var(--line-w) solid var(--c);
            transform-origin: bottom center;
            transform: rotate(-2deg);
        }
        .flower__grass--bottom {
            margin-top: -2px;
            width: var(--line-w);
            height: 25vmin;
            background-image: linear-gradient(to top, transparent, var(--c));
        }

        .flower__grass__leaf {
            --size: 10vmin;
            position: absolute;
            width: calc(var(--size) * 2.1);
            height: var(--size);
            border-top-left-radius: var(--size);
            border-top-right-radius: var(--size);
            background-image: linear-gradient(to top, transparent, transparent 30%, var(--c));
            z-index: 100;
        }
        .flower__grass__leaf--1 { top: -6%; left: 30%; --size: 6vmin; transform: rotate(-20deg); animation: growing-grass-ans--1 2s 2.6s backwards; }
        .flower__grass__leaf--2 { top: -5%; left: -110%; --size: 6vmin; transform: rotate(10deg); animation: growing-grass-ans--2 2s 2.4s linear backwards; }
        .flower__grass__leaf--3 { top: 5%; left: 60%; --size: 8vmin; transform: rotate(-18deg) rotateX(-20deg); animation: growing-grass-ans--3 2s 2.2s linear backwards; }
        .flower__grass__leaf--4 { top: 6%; left: -135%; --size: 8vmin; transform: rotate(2deg); animation: growing-grass-ans--4 2s 2s linear backwards; }
        .flower__grass__leaf--5 { top: 20%; left: 60%; --size: 10vmin; transform: rotate(-24deg) rotateX(-20deg); animation: growing-grass-ans--5 2s 1.8s linear backwards; }
        .flower__grass__leaf--6 { top: 22%; left: -180%; --size: 10vmin; transform: rotate(10deg); animation: growing-grass-ans--6 2s 1.6s linear backwards; }
        .flower__grass__leaf--7 { top: 39%; left: 70%; --size: 10vmin; transform: rotate(-10deg); animation: growing-grass-ans--7 2s 1.4s linear backwards; }
        .flower__grass__leaf--8 { top: 40%; left: -215%; --size: 11vmin; transform: rotate(10deg); animation: growing-grass-ans--8 2s 1.2s linear backwards; }

        .flower__grass__overlay {
            position: absolute;
            top: -10%;
            right: 0%;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            filter: blur(1.5vmin);
            z-index: 100;
        }

        @keyframes growing-grass-ans--1 { 0% { transform-origin: bottom left; transform: rotate(-20deg) scale(0); } }
        @keyframes growing-grass-ans--2 { 0% { transform-origin: bottom right; transform: rotate(10deg) scale(0); } }
        @keyframes growing-grass-ans--3 { 0% { transform-origin: bottom left; transform: rotate(-18deg) rotateX(-20deg) scale(0); } }
        @keyframes growing-grass-ans--4 { 0% { transform-origin: bottom right; transform: rotate(2deg) scale(0); } }
        @keyframes growing-grass-ans--5 { 0% { transform-origin: bottom left; transform: rotate(-24deg) rotateX(-20deg) scale(0); } }
        @keyframes growing-grass-ans--6 { 0% { transform-origin: bottom right; transform: rotate(10deg) scale(0); } }
        @keyframes growing-grass-ans--7 { 0% { transform-origin: bottom left; transform: rotate(-10deg) scale(0); } }
        @keyframes growing-grass-ans--8 { 0% { transform-origin: bottom right; transform: rotate(10deg) scale(0); } }

        /* ===== Long Green Stem ===== */
        .flower__g-long {
            --w: 2vmin;
            --h: 6vmin;
            --c: #40916c;
            position: absolute;
            bottom: 10vmin;
            left: -3vmin;
            transform-origin: bottom center;
            transform: rotate(-30deg) rotateY(-20deg);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            animation: flower-g-long-ans 3s linear infinite;
        }
        .flower__g-long__top {
            top: calc(var(--h) * -1);
            width: calc(var(--w) + 1vmin);
            height: var(--h);
            border-top-right-radius: 100%;
            border-right: 0.7vmin solid var(--c);
            transform: translate(-0.7vmin, 1vmin);
        }
        .flower__g-long__bottom {
            width: var(--w);
            height: 50vmin;
            transform-origin: bottom center;
            background-image: linear-gradient(to top, transparent 30%, var(--c));
            box-shadow: inset 0 0 2px rgba(0,0,0,0.5);
            clip-path: polygon(35% 0, 65% 1%, 100% 100%, 0% 100%);
        }

        @keyframes flower-g-long-ans {
            0%, 100% { transform: rotate(-30deg) rotateY(-20deg); }
            50% { transform: rotate(-32deg) rotateY(-20deg); }
        }

        /* ===== Right-side Large Leaves ===== */
        .flower__g-right {
            position: absolute;
            bottom: 6vmin;
            left: -2vmin;
            transform-origin: bottom left;
            transform: rotate(20deg);
        }
        .flower__g-right .leaf {
            width: 30vmin;
            height: 50vmin;
            border-top-left-radius: 100%;
            border-left: 2vmin solid #2d6a4f;
            background-image: linear-gradient(to bottom, transparent, var(--dark-color) 60%);
            -webkit-mask-image: linear-gradient(to top, transparent 30%, #2d6a4f 60%);
        }
        .flower__g-right--1 { animation: flower-g-right-ans 2.5s linear infinite; }
        .flower__g-right--2 {
            left: 5vmin;
            transform: rotateY(-180deg);
            animation: flower-g-right-ans--2 3s linear infinite;
        }
        .flower__g-right--2 .leaf {
            height: 75vmin;
            filter: blur(0.3vmin);
            opacity: 0.8;
        }

        @keyframes flower-g-right-ans {
            0%, 100% { transform: rotate(20deg); }
            50% { transform: rotate(24deg) rotateX(-20deg); }
        }
        @keyframes flower-g-right-ans--2 {
            0%, 100% { transform: rotateY(-180deg) rotate(0deg) rotateX(-20deg); }
            50% { transform: rotateY(-180deg) rotate(6deg) rotateX(-20deg); }
        }

        /* ===== Front Greenery ===== */
        .flower__g-front {
            position: absolute;
            bottom: 6vmin;
            left: 2.5vmin;
            z-index: 100;
            transform-origin: bottom center;
            transform: rotate(-28deg) rotateY(30deg) scale(1.04);
            animation: flower__g-front-ans 2s linear infinite;
        }
        .flower__g-front__line {
            width: 0.3vmin;
            height: 20vmin;
            background-image: linear-gradient(to top, transparent, #2d6a4f, transparent 100%);
            position: relative;
        }
        .flower__g-front__leaf-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: bottom left;
            transform: rotate(10deg);
        }
        .flower__g-front__leaf-wrapper:nth-child(even) {
            left: 0vmin;
            transform: rotateY(-180deg) rotate(5deg);
            animation: flower__g-front__leaf-left-ans 1s ease-in backwards;
        }
        .flower__g-front__leaf-wrapper:nth-child(odd) {
            animation: flower__g-front__leaf-ans 1s ease-in backwards;
        }
        .flower__g-front__leaf-wrapper--1 {
            top: -8vmin;
            transform: scale(0.7);
            animation: flower__g-front__leaf-ans 1s 5.5s ease-in backwards !important;
        }
        .flower__g-front__leaf-wrapper--2 {
            top: -8vmin;
            transform: rotateY(-180deg) scale(0.7) !important;
            animation: flower__g-front__leaf-left-ans-2 1s 5.2s ease-in backwards !important;
        }
        .flower__g-front__leaf-wrapper--3 {
            top: -3vmin;
            animation-delay: 4.9s !important;
        }
        .flower__g-front__leaf-wrapper--4 {
            top: -3vmin;
            transform: rotateY(-180deg) scale(0.9) !important;
            animation: flower__g-front__leaf-left-ans-2 1s 4.6s ease-in backwards !important;
        }
        .flower__g-front__leaf-wrapper--5,
        .flower__g-front__leaf-wrapper--6 { top: 2vmin; }
        .flower__g-front__leaf-wrapper--7,
        .flower__g-front__leaf-wrapper--8 { top: 6.5vmin; }

        .flower__g-front__leaf-wrapper--5 { animation-delay: 4.3s !important; }
        .flower__g-front__leaf-wrapper--6 { animation-delay: 4.1s !important; }
        .flower__g-front__leaf-wrapper--7 { animation-delay: 3.8s !important; }
        .flower__g-front__leaf-wrapper--8 { animation-delay: 3.5s !important; }

        .flower__g-front__leaf {
            width: 10vmin;

    <!-- Continue Button -->
    <div class="continue-wrapper">
        <button class="continue-btn" id="continueBtn">Step Into Our Memories 💕</button>
    </div>

    <script>
        // Start animations after a brief pause
        window.onload = () => {
            const c = setTimeout(() => {
                document.body.classList.remove("not-loaded");
                clearTimeout(c);
            }, 1000);
        };

        // Continue button — fade out and go to last.html
        document.getElementById('continueBtn').addEventListener('click', () => {
            document.body.style.transition = 'opacity 1s ease';
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = 'last.html';
            }, 1000);
        });
    </script>
